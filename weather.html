<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <button id="theme-toggle" class="theme-toggle">Switch to Dark Mode</button>
        <h1>Weather Dashboard</h1>
        <div class="search-box">
            <input type="text" id="city-input" placeholder="Enter city name...">
            <button id="search-btn">Search</button>
        </div>
        <div class="current-weather">
            <h2>Current Weather</h2>
            <p id="current-temp">Temperature: <span id="temp-value"></span> °C</p>
            <p id="humidity">Humidity: <span id="humidity-value"></span> %</p>
            <p id="wind-speed">Wind Speed: <span id="wind-speed-value"></span> m/s</p>
            <p id="pressure">Pressure: <span id="pressure-value"></span> hPa</p>
            <p id="feels-like">Feels Like: <span id="feels-like-value"></span> °C</p>
        </div>
        <div class="forecast">
            <h2>5-Day Forecast</h2>
            <div id="forecast-container"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
